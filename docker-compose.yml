services:
  ops-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.ops_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      BROKER_GATEWAY_URL: http://broker-gateway:8001
      SHADOW_LIVE_URL: http://shadow-live:8005
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      CLICKHOUSE_HOST: clickhouse
    ports:
      - "8000:8000"
    depends_on:
      - mariadb
      - redis
      - nats
      - minio
      - clickhouse

  broker-gateway:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.broker_gateway.main:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file:
      - .env
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      CLICKHOUSE_HOST: clickhouse
    ports:
      - "8001:8001"
    depends_on:
      - mariadb
      - redis
      - nats
      - minio
      - clickhouse

  market-intel:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.market_intel.main:app", "--host", "0.0.0.0", "--port", "8003"]
    env_file:
      - .env
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      CLICKHOUSE_HOST: clickhouse
    ports:
      - "8003:8003"
    depends_on:
      - mariadb
      - redis
      - nats
      - minio
      - clickhouse

  trading-core:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.trading_core.main:app", "--host", "0.0.0.0", "--port", "8002"]
    env_file:
      - .env
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      CLICKHOUSE_HOST: clickhouse
    ports:
      - "8002:8002"
    depends_on:
      - mariadb
      - redis
      - nats
      - minio
      - clickhouse

  replay-runner:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.replay_runner.main:app", "--host", "0.0.0.0", "--port", "8004"]
    env_file:
      - .env
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      CLICKHOUSE_HOST: clickhouse
    ports:
      - "8004:8004"
    depends_on:
      - mariadb
      - redis
      - nats
      - minio
      - clickhouse

  shadow-live:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.shadow_live.main:app", "--host", "0.0.0.0", "--port", "8005"]
    env_file:
      - .env
    environment:
      BROKER_GATEWAY_URL: http://broker-gateway:8001
      OPS_API_URL: http://ops-api:8000
      SELECTOR_ENGINE_URL: http://selector-engine:8008
      PORTFOLIO_ENGINE_URL: http://portfolio-engine:8009
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      CLICKHOUSE_HOST: clickhouse
    ports:
      - "8005:8005"
    depends_on:
      - broker-gateway
      - ops-api
      - selector-engine
      - portfolio-engine
      - mariadb
      - redis
      - nats
      - minio
      - clickhouse

  data-ingest:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.data_ingest.main:app", "--host", "0.0.0.0", "--port", "8006"]
    env_file:
      - .env
    environment:
      CLICKHOUSE_HOST: clickhouse
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8006:8006"
    depends_on:
      - mariadb
      - redis
      - nats
      - minio
      - clickhouse

  feature-pipeline:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.feature_pipeline.main:app", "--host", "0.0.0.0", "--port", "8007"]
    env_file:
      - .env
    environment:
      CLICKHOUSE_HOST: clickhouse
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8007:8007"
    depends_on:
      - market-intel
      - clickhouse

  selector-engine:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.selector_engine.main:app", "--host", "0.0.0.0", "--port", "8008"]
    env_file:
      - .env
    environment:
      BROKER_GATEWAY_URL: http://broker-gateway:8001
      CLICKHOUSE_HOST: clickhouse
      MARKET_INTEL_URL: http://market-intel:8003
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8008:8008"
    depends_on:
      - market-intel
      - broker-gateway
      - feature-pipeline
      - clickhouse

  portfolio-engine:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "apps.portfolio_engine.main:app", "--host", "0.0.0.0", "--port", "8009"]
    env_file:
      - .env
    environment:
      CLICKHOUSE_HOST: clickhouse
      SELECTOR_ENGINE_URL: http://selector-engine:8008
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8009:8009"
    depends_on:
      - selector-engine
      - clickhouse

  ops-web:
    build:
      context: ./ops-web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      OPS_API_PROXY_TARGET: http://ops-api:8000
      BROKER_GATEWAY_PROXY_TARGET: http://broker-gateway:8001
      TRADING_CORE_PROXY_TARGET: http://trading-core:8002
      MARKET_INTEL_PROXY_TARGET: http://market-intel:8003
      REPLAY_RUNNER_PROXY_TARGET: http://replay-runner:8004
      SHADOW_LIVE_PROXY_TARGET: http://shadow-live:8005
      DATA_INGEST_PROXY_TARGET: http://data-ingest:8006
      SELECTOR_ENGINE_PROXY_TARGET: http://selector-engine:8008
      PORTFOLIO_ENGINE_PROXY_TARGET: http://portfolio-engine:8009
    ports:
      - "5173:5173"
    depends_on:
      - ops-api
      - broker-gateway
      - trading-core
      - market-intel
      - replay-runner
      - shadow-live
      - data-ingest
      - selector-engine
      - portfolio-engine

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: kis_ai_trading
      MARIADB_USER: kis
      MARIADB_PASSWORD: kis_password
      MARIADB_ROOT_PASSWORD: root_password
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - ./mariadb-data:/var/lib/mysql

  redis:
    image: redis:7.4
    restart: unless-stopped
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats-data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:25.1
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9009:9000"
    environment:
      CLICKHOUSE_DB: kis_ai_trading
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - ./clickhouse-data:/var/lib/clickhouse

  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki-data:/loki

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana-data:/var/lib/grafana
